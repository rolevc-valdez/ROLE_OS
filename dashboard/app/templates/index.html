<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ app_name }}</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <span class="brand">ROLE OS</span>
      <form id="search-form" class="search-form" autocomplete="off">
        <input
          id="search-input"
          type="search"
          name="q"
          placeholder="Search knowledge cards..."
          aria-label="Search knowledge cards"
        />
        <button type="submit">Search</button>
      </form>
      <span class="version">v{{ app_version }}</span>
    </div>
  </header>

  <nav class="tabs">
    <div class="tabs-inner">
      <button type="button" class="tab-btn active" data-tab="knowledge">Knowledge</button>
      <button type="button" class="tab-btn" data-tab="projects">Projects</button>
      <button type="button" class="tab-btn" data-tab="advisor">Advisor</button>
    </div>
  </nav>

  <div id="knowledge-tab" class="tab-panel active">
  <div class="layout">
    <aside class="sidebar">
      <h2>Knowledge Areas</h2>
      <ul id="project-list" class="project-list">
        <li class="muted">Loading projects…</li>
      </ul>
    </aside>

    <main class="content">
      <section id="results-section">
        <div class="section-header">
          <h2 id="results-title">Recent knowledge cards</h2>
          <button id="clear-search" class="link-btn" hidden>Clear search</button>
        </div>
        <ul id="card-list" class="card-list">
          <li class="muted">Loading…</li>
        </ul>
      </section>

      <section id="timeline-section">
        <div class="section-header">
          <h2>Timeline</h2>
        </div>
        <ol id="timeline-list" class="timeline-list">
          <li class="muted">Loading timeline…</li>
        </ol>
      </section>
    </main>
  </div>
  </div>

  <div id="projects-tab" class="tab-panel" hidden>
    <div class="pi-layout">
      <div class="pi-toolbar">
        <label for="workspace-select">Workspace</label>
        <select id="workspace-select">
          <option value="">All workspaces</option>
        </select>
      </div>

      <div id="pi-list-view">
        <ul id="pi-project-list" class="pi-project-list">
          <li class="muted">Loading projects…</li>
        </ul>
      </div>

      <div id="pi-detail-view" hidden>
        <button id="pi-back-btn" class="link-btn">&larr; Back to projects</button>
        <div id="pi-detail-body">
          <p class="muted">Loading…</p>
        </div>
      </div>
    </div>
  </div>

  <div id="advisor-tab" class="tab-panel" hidden>
    <div class="advisor-layout">
      <div class="pi-toolbar">
        <label for="advisor-workspace-select">Workspace</label>
        <select id="advisor-workspace-select">
          <option value="">All workspaces</option>
        </select>
      </div>

      <section id="daily-brief" class="advisor-section">
        <div class="section-header">
          <h2>Daily Brief</h2>
        </div>
        <pre id="daily-brief-greeting" class="brief-greeting">Loading…</pre>
      </section>

      <section class="advisor-section">
        <div class="section-header">
          <h2>Recommendations</h2>
        </div>
        <ul id="advisor-recommendation-list" class="advisor-recommendation-list">
          <li class="muted">Loading recommendations…</li>
        </ul>
      </section>
    </div>
  </div>

  <div id="detail-overlay" class="overlay" hidden>
    <div class="detail-panel" role="dialog" aria-modal="true" aria-labelledby="detail-title">
      <button id="detail-close" class="close-btn" aria-label="Close">&times;</button>
      <div id="detail-body">
        <p class="muted">Loading…</p>
      </div>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
