<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ app_name }}</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div id="app-shell">
    <nav id="sidebar" class="sidebar">
      <div class="sidebar-brand" data-nav="home">ROLE OS</div>
      <ul class="sidebar-nav">
        <li class="nav-item active" data-nav="home">
          <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 11l9-7 9 7"/><path d="M5 10v9h14v-9"/></svg>
          <span>Home</span>
        </li>
        <li class="nav-item" data-nav="projects">
          <svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18"/></svg>
          <span>Projects</span>
        </li>
        <li class="nav-item" data-nav="knowledge">
          <svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 5c4-2 8-2 8 0v14c0-2-4-2-8 0z"/><path d="M20 5c-4-2-8-2-8 0v14c0-2 4-2 8 0z"/></svg>
          <span>Knowledge</span>
        </li>
        <li class="nav-item" data-nav="explorer">
          <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <span>Explorer</span>
        </li>
        <li class="nav-item" data-nav="advisor">
          <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v5l3 2"/></svg>
          <span>Advisor</span>
        </li>
        <li class="nav-item" data-nav="graph">
          <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="6" cy="6" r="2.4"/><circle cx="18" cy="6" r="2.4"/><circle cx="12" cy="18" r="2.4"/><path d="M8 7l6 9M16 7l-6 9M8.4 6h7.2"/></svg>
          <span>Graph</span>
        </li>
        <li class="nav-item" data-nav="assets">
          <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 2l3 6 6 1-4.5 4.5L18 20l-6-3-6 3 1.5-6.5L3 9l6-1z"/></svg>
          <span>Assets</span>
        </li>
        <li class="nav-item" data-nav="settings">
          <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 00.3 1.9l.1.1a2 2 0 11-2.8 2.8l-.1-.1a1.7 1.7 0 00-1.9-.3 1.7 1.7 0 00-1 1.5V21a2 2 0 11-4 0v-.2a1.7 1.7 0 00-1-1.5 1.7 1.7 0 00-1.9.3l-.1.1a2 2 0 11-2.8-2.8l.1-.1a1.7 1.7 0 00.3-1.9 1.7 1.7 0 00-1.5-1H3a2 2 0 110-4h.2a1.7 1.7 0 001.5-1 1.7 1.7 0 00-.3-1.9l-.1-.1a2 2 0 112.8-2.8l.1.1a1.7 1.7 0 001.9.3H9a1.7 1.7 0 001-1.5V3a2 2 0 114 0v.2a1.7 1.7 0 001 1.5 1.7 1.7 0 001.9-.3l.1-.1a2 2 0 112.8 2.8l-.1.1a1.7 1.7 0 00-.3 1.9V9a1.7 1.7 0 001.5 1H21a2 2 0 110 4h-.2a1.7 1.7 0 00-1.5 1z"/></svg>
          <span>Settings</span>
        </li>
      </ul>
    </nav>

    <div class="app-main">
      <header class="app-header">
        <div class="header-search">
          <input id="global-search-input" type="search" placeholder="Search ROLE OS..." aria-label="Global search" autocomplete="off" />
          <div id="global-search-results" class="search-results-panel" hidden></div>
        </div>
        <select id="header-workspace-select" aria-label="Workspace">
          <option value="">All workspaces</option>
        </select>
        <span id="header-datetime" class="header-datetime"></span>
        <div class="quick-actions">
          <button type="button" class="btn btn-sm" data-nav="advisor">Daily Brief</button>
          <button type="button" class="btn btn-sm btn-primary" data-nav="graph">Open Graph</button>
        </div>
      </header>

      <main id="view-root" aria-live="polite">
        <p class="muted">Loading...</p>
      </main>
    </div>
  </div>

  <div id="detail-overlay" class="overlay" hidden>
    <div class="detail-panel" role="dialog" aria-modal="true" aria-labelledby="detail-title">
      <button id="detail-close" class="close-btn" aria-label="Close">&times;</button>
      <div id="detail-body">
        <p class="muted">Loading…</p>
      </div>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
